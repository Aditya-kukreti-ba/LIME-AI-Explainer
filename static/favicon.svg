<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0f0f1a"/>

  <!-- Bar chart representing LIME feature weights -->
  <!-- Positive bars (cyan) -->
  <rect x="10" y="28" width="8" height="22" rx="2" fill="#4cc9f0"/>
  <rect x="22" y="20" width="8" height="30" rx="2" fill="#4cc9f0"/>
  <rect x="34" y="34" width="8" height="16" rx="2" fill="#4cc9f0"/>

  <!-- Negative bar (pink) -->
  <rect x="46" y="38" width="8" height="12" rx="2" fill="#f72585"/>

  <!-- Baseline -->
  <line x1="6" y1="51" x2="58" y2="51" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- "L" lettermark top-left dot accent -->
  <circle cx="10" cy="10" r="4" fill="#4cc9f0" opacity="0.9"/>
  <circle cx="22" cy="10" r="4" fill="#f72585" opacity="0.7"/>
</svg>
